<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Paper texture background -->
  <rect width="400" height="300" fill="#fdf6e3" rx="4"/>
  <!-- Slightly aged paper lines -->
  <line x1="0" y1="280" x2="400" y2="280" stroke="#e8dfc0" stroke-width="0.5"/>

  <!-- BICYCLE FRAME (hand-drawn style with slight wobble) -->
  <!-- Rear wheel -->
  <circle cx="105" cy="200" r="52" fill="none" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"
    style="stroke-dasharray:0;"/>
  <!-- Rear wheel spokes -->
  <line x1="105" y1="148" x2="105" y2="252" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="53" y1="200" x2="157" y2="200" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="68" y1="163" x2="142" y2="237" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="68" y1="237" x2="142" y2="163" stroke="#2a1a0a" stroke-width="1.5"/>
  <circle cx="105" cy="200" r="6" fill="#2a1a0a"/>

  <!-- Front wheel -->
  <circle cx="285" cy="200" r="52" fill="none" stroke="#2a1a0a" stroke-width="3.5"/>
  <!-- Front wheel spokes -->
  <line x1="285" y1="148" x2="285" y2="252" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="233" y1="200" x2="337" y2="200" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="248" y1="163" x2="322" y2="237" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="248" y1="237" x2="322" y2="163" stroke="#2a1a0a" stroke-width="1.5"/>
  <circle cx="285" cy="200" r="6" fill="#2a1a0a"/>

  <!-- Chain stay / seat stay / top tube -->
  <path d="M 105 200 L 175 155 L 240 155 L 285 200" fill="none" stroke="#2a1a0a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Down tube -->
  <path d="M 240 155 L 105 200" fill="none" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Fork -->
  <path d="M 260 155 L 285 200" fill="none" stroke="#2a1a0a" stroke-width="4" stroke-linecap="round"/>
  <!-- Seat post -->
  <line x1="175" y1="155" x2="170" y2="125" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Saddle -->
  <path d="M 155 122 Q 170 116 188 122" fill="none" stroke="#2a1a0a" stroke-width="4" stroke-linecap="round"/>
  <!-- Handlebar stem -->
  <line x1="258" y1="155" x2="262" y2="128" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Drop handlebars -->
  <path d="M 252 126 Q 262 120 272 126" fill="none" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Pedal cranks -->
  <line x1="175" y1="155" x2="165" y2="172" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="175" y1="155" x2="185" y2="138" stroke="#2a1a0a" stroke-width="3.5" stroke-linecap="round"/>
  <rect x="158" y="171" width="14" height="5" rx="2" fill="#2a1a0a"/>
  <rect x="183" y="131" width="14" height="5" rx="2" fill="#2a1a0a"/>

  <!-- RIDER FIGURE -->
  <!-- Torso - leaning forward in jousting stance -->
  <path d="M 192 122 L 245 108 L 255 118 L 200 132 Z" fill="#3a2010" stroke="#2a1a0a" stroke-width="1.5"/>
  <!-- Legs -->
  <path d="M 195 128 L 178 155 L 165 172" fill="none" stroke="#2a1a0a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm holding lance -->
  <path d="M 248 110 L 265 102 L 310 96" fill="none" stroke="#2a1a0a" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Other arm -->
  <path d="M 250 115 L 263 126 L 268 128" fill="none" stroke="#2a1a0a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- JOUSTING HELMET (great helm style) -->
  <rect x="239" y="82" width="32" height="30" rx="4" fill="#5a4030" stroke="#2a1a0a" stroke-width="2.5"/>
  <!-- Visor slit -->
  <rect x="243" y="92" width="24" height="5" rx="2" fill="#fdf6e3"/>
  <!-- Helmet plume -->
  <path d="M 255 82 Q 250 68 242 58 Q 248 62 255 70 Q 262 58 268 48 Q 265 60 260 70 Q 266 65 274 68 Q 266 76 260 82" fill="#8f2d2d" stroke="#6a1a1a" stroke-width="1"/>

  <!-- THE LANCE (long diagonal across the image) -->
  <line x1="310" y1="96" x2="-10" y2="130" stroke="#5a3510" stroke-width="5" stroke-linecap="round"/>
  <!-- Lance tip (diamond point) -->
  <polygon points="-10,130 5,122 12,130 5,138" fill="#888" stroke="#2a1a0a" stroke-width="1.5"/>
  <!-- Lance grip wrapping -->
  <line x1="295" y1="98" x2="285" y2="99" stroke="#8f2d2d" stroke-width="2.5"/>
  <line x1="275" y1="100" x2="265" y2="101" stroke="#8f2d2d" stroke-width="2.5"/>
  <line x1="255" y1="102" x2="245" y2="103" stroke="#8f2d2d" stroke-width="2.5"/>

  <!-- SPEED LINES behind bicycle -->
  <line x1="50" y1="175" x2="20" y2="175" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="45" y1="185" x2="10" y2="185" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="52" y1="195" x2="15" y2="195" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="48" y1="205" x2="18" y2="207" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="44" y1="215" x2="12" y2="217" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Ground shadow -->
  <ellipse cx="195" cy="256" rx="100" ry="8" fill="rgba(0,0,0,0.07)"/>

  <!-- Caption -->
  <text x="200" y="277" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="11" fill="#6a4a2a" font-style="italic">Fig. 1 — The Bicycle Knight at full charge (artist's impression)</text>
</svg>
