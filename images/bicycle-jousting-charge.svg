<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" width="560" height="260">
  <defs>
    <!-- Animated left rider moving right -->
    <animateTransform id="leftRide"/>
    <!-- Stars/impact flash -->
    <radialGradient id="impactGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7a0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffcc00" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="560" height="260" fill="#e8f4f8"/>
  <!-- Ground -->
  <rect x="0" y="210" width="560" height="50" fill="#c8d8a0"/>
  <!-- Ground line -->
  <line x1="0" y1="210" x2="560" y2="210" stroke="#7a9a50" stroke-width="2"/>
  <!-- Crowd dots (simple) -->
  <g opacity="0.4">
    <circle cx="30" cy="195" r="8" fill="#c86060"/>
    <circle cx="55" cy="190" r="8" fill="#6080c0"/>
    <circle cx="80" cy="193" r="7" fill="#60a060"/>
    <circle cx="105" cy="188" r="8" fill="#c8a040"/>
    <circle cx="450" cy="193" r="8" fill="#c86060"/>
    <circle cx="475" cy="188" r="8" fill="#6080c0"/>
    <circle cx="500" cy="192" r="7" fill="#60a060"/>
    <circle cx="525" cy="189" r="8" fill="#c8a040"/>
    <!-- crowd arms -->
    <line x1="30" y1="187" x2="22" y2="178" stroke="#c86060" stroke-width="2"/>
    <line x1="55" y1="182" x2="62" y2="172" stroke="#6080c0" stroke-width="2"/>
    <line x1="475" y1="180" x2="468" y2="170" stroke="#6080c0" stroke-width="2"/>
    <line x1="500" y1="184" x2="508" y2="174" stroke="#60a060" stroke-width="2"/>
  </g>

  <!-- ANIMATED LEFT CYCLIST GROUP (moving right →) -->
  <g id="leftCyclist">
    <animateTransform attributeName="transform" attributeType="XML"
      type="translate"
      values="0,0; 80,0; 80,0; 0,0"
      keyTimes="0; 0.45; 0.55; 1"
      dur="3s" repeatCount="indefinite"/>

    <!-- Rear wheel -->
    <circle cx="80" cy="175" r="38" fill="none" stroke="#2a3a8a" stroke-width="3"/>
    <line x1="80" y1="137" x2="80" y2="213" stroke="#2a3a8a" stroke-width="1.5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 80 175" to="360 80 175" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="42" y1="175" x2="118" y2="175" stroke="#2a3a8a" stroke-width="1.5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 80 175" to="360 80 175" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <circle cx="80" cy="175" r="5" fill="#2a3a8a"/>

    <!-- Front wheel -->
    <circle cx="210" cy="175" r="38" fill="none" stroke="#2a3a8a" stroke-width="3"/>
    <line x1="210" y1="137" x2="210" y2="213" stroke="#2a3a8a" stroke-width="1.5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 210 175" to="360 210 175" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="172" y1="175" x2="248" y2="175" stroke="#2a3a8a" stroke-width="1.5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 210 175" to="360 210 175" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <circle cx="210" cy="175" r="5" fill="#2a3a8a"/>

    <!-- Frame -->
    <path d="M 80 175 L 135 135 L 185 135 L 210 175" fill="none" stroke="#2a3a8a" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M 185 135 L 80 175" fill="none" stroke="#2a3a8a" stroke-width="3"/>
    <path d="M 190 135 L 210 175" fill="none" stroke="#2a3a8a" stroke-width="3.5"/>
    <!-- Seat post -->
    <line x1="135" y1="135" x2="130" y2="112" stroke="#2a3a8a" stroke-width="3"/>
    <path d="M 118 109 Q 130 104 144 109" fill="none" stroke="#2a3a8a" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Handlebar -->
    <line x1="188" y1="135" x2="192" y2="112" stroke="#2a3a8a" stroke-width="3"/>
    <path d="M 183 111 Q 192 106 202 111" fill="none" stroke="#2a3a8a" stroke-width="3" stroke-linecap="round"/>

    <!-- Rider body -->
    <path d="M 148 109 L 190 98 L 196 108 L 153 120 Z" fill="#d06a40" stroke="#8f2d2d" stroke-width="1.5"/>
    <!-- Leg -->
    <path d="M 150 115 L 137 135 L 126 150" fill="none" stroke="#3a2010" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arm holding lance -->
    <path d="M 193 101 L 210 93 L 390 82" fill="none" stroke="#3a2010" stroke-width="4" stroke-linecap="round"/>
    <!-- Helmet (red + plume) -->
    <rect x="183" y="72" width="26" height="26" rx="4" fill="#8f2d2d" stroke="#2a1a0a" stroke-width="2"/>
    <rect x="187" y="82" width="18" height="4" rx="2" fill="#fdf6e3"/>
    <path d="M 196 72 Q 192 60 186 50 Q 192 56 196 64 Q 200 52 206 44 Q 203 56 198 65" fill="#d4af37" stroke="#b8960a" stroke-width="1"/>

    <!-- LANCE pointing RIGHT -->
    <line x1="390" y1="82" x2="420" y2="80" stroke="#5a3510" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Lance tip -->
    <polygon points="420,80 408,74 406,80 408,86" fill="#aaa" stroke="#555" stroke-width="1.5"/>

    <!-- Speed lines -->
    <line x1="68" y1="155" x2="35" y2="155" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
    <line x1="62" y1="165" x2="25" y2="167" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
    <line x1="65" y1="175" x2="28" y2="177" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
    <line x1="62" y1="185" x2="30" y2="187" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  </g>

  <!-- ANIMATED RIGHT CYCLIST GROUP (moving left ←, mirrored) -->
  <g id="rightCyclist" transform="scale(-1,1) translate(-560,0)">
    <animateTransform attributeName="transform" attributeType="XML"
      type="translate"
      values="0,0; 80,0; 80,0; 0,0"
      keyTimes="0; 0.45; 0.55; 1"
      dur="3s" repeatCount="indefinite"/>

    <!-- Rear wheel -->
    <circle cx="80" cy="175" r="38" fill="none" stroke="#2a8a3a" stroke-width="3"/>
    <line x1="80" y1="137" x2="80" y2="213" stroke="#2a8a3a" stroke-width="1.5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 80 175" to="360 80 175" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="42" y1="175" x2="118" y2="175" stroke="#2a8a3a" stroke-width="1.5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 80 175" to="360 80 175" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <circle cx="80" cy="175" r="5" fill="#2a8a3a"/>

    <!-- Front wheel -->
    <circle cx="210" cy="175" r="38" fill="none" stroke="#2a8a3a" stroke-width="3"/>
    <line x1="210" y1="137" x2="210" y2="213" stroke="#2a8a3a" stroke-width="1.5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 210 175" to="360 210 175" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="172" y1="175" x2="248" y2="175" stroke="#2a8a3a" stroke-width="1.5">
      <animateTransform attributeName="transform" attributeType="XML" type="rotate"
        from="0 210 175" to="360 210 175" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <circle cx="210" cy="175" r="5" fill="#2a8a3a"/>

    <!-- Frame -->
    <path d="M 80 175 L 135 135 L 185 135 L 210 175" fill="none" stroke="#2a8a3a" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M 185 135 L 80 175" fill="none" stroke="#2a8a3a" stroke-width="3"/>
    <path d="M 190 135 L 210 175" fill="none" stroke="#2a8a3a" stroke-width="3.5"/>
    <!-- Seat post -->
    <line x1="135" y1="135" x2="130" y2="112" stroke="#2a8a3a" stroke-width="3"/>
    <path d="M 118 109 Q 130 104 144 109" fill="none" stroke="#2a8a3a" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Handlebar -->
    <line x1="188" y1="135" x2="192" y2="112" stroke="#2a8a3a" stroke-width="3"/>
    <path d="M 183 111 Q 192 106 202 111" fill="none" stroke="#2a8a3a" stroke-width="3" stroke-linecap="round"/>

    <!-- Rider body -->
    <path d="M 148 109 L 190 98 L 196 108 L 153 120 Z" fill="#4a9a50" stroke="#2a6a30" stroke-width="1.5"/>
    <!-- Leg -->
    <path d="M 150 115 L 137 135 L 126 150" fill="none" stroke="#3a2010" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arm holding lance -->
    <path d="M 193 101 L 210 93 L 390 82" fill="none" stroke="#3a2010" stroke-width="4" stroke-linecap="round"/>
    <!-- Helmet (green + plume) -->
    <rect x="183" y="72" width="26" height="26" rx="4" fill="#2a6a30" stroke="#2a1a0a" stroke-width="2"/>
    <rect x="187" y="82" width="18" height="4" rx="2" fill="#fdf6e3"/>
    <path d="M 196 72 Q 192 60 186 50 Q 192 56 196 64 Q 200 52 206 44 Q 203 56 198 65" fill="#6ab0d4" stroke="#3a80a4" stroke-width="1"/>

    <!-- LANCE pointing RIGHT (mirrored = pointing left) -->
    <line x1="390" y1="82" x2="420" y2="80" stroke="#5a3510" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Lance tip -->
    <polygon points="420,80 408,74 406,80 408,86" fill="#aaa" stroke="#555" stroke-width="1.5"/>

    <!-- Speed lines -->
    <line x1="68" y1="155" x2="35" y2="155" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
    <line x1="62" y1="165" x2="25" y2="167" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
    <line x1="65" y1="175" x2="28" y2="177" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
    <line x1="62" y1="185" x2="30" y2="187" stroke="#aac" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  </g>

  <!-- IMPACT FLASH at centre (timed with collision) -->
  <g transform="translate(280,105)">
    <circle r="0" fill="url(#impactGlow)">
      <animate attributeName="r" values="0;0;55;45;0" keyTimes="0;0.44;0.50;0.56;0.62" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Impact stars -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.44;0.48;0.56;0.62" dur="3s" repeatCount="indefinite"/>
      <text x="0" y="-30" text-anchor="middle" font-size="22" fill="#ffcc00">★</text>
      <text x="28" y="0" text-anchor="middle" font-size="18" fill="#ff6600">✦</text>
      <text x="-28" y="0" text-anchor="middle" font-size="18" fill="#ff6600">✦</text>
      <text x="14" y="28" text-anchor="middle" font-size="16" fill="#ffcc00">★</text>
      <text x="-14" y="28" text-anchor="middle" font-size="16" fill="#ffcc00">★</text>
      <text x="0" y="8" text-anchor="middle" font-size="28" fill="#fff">💥</text>
    </g>
  </g>

  <!-- Caption banner -->
  <rect x="0" y="230" width="560" height="30" fill="rgba(0,0,0,0.55)"/>
  <text x="280" y="250" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="13" fill="#fffdf8" font-style="italic">The charge. The glory. The mild concussion. — Bicycle Jousting in action.</text>
</svg>
